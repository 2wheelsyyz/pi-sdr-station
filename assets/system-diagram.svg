<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="720" viewBox="0 0 1240 720" font-family="Menlo, Consolas, monospace">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <marker id="arP" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f85149"/>
    </marker>
    <marker id="arA" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#a371f7"/>
    </marker>
  </defs>
  <style>
    .b{fill:#161b22;stroke-width:1.7}
    .t{fill:#d7dde4;font-size:12px;text-anchor:middle}
    .s{fill:#9aa6b2;font-size:10px;text-anchor:middle}
    .sl{fill:#9aa6b2;font-size:10px;text-anchor:start}
    .ttl{fill:#ffffff;font-size:12px;font-weight:bold}
    .li{fill:#d7dde4;font-size:11px;text-anchor:start}
    .lab{fill:#8b949e;font-size:9.5px;text-anchor:middle}
    .labl{fill:#8b949e;font-size:9.5px;text-anchor:start}
    line{stroke:#8b949e;stroke-width:1.4}
  </style>

  <rect x="0" y="0" width="1240" height="720" fill="#0e1116"/>
  <text x="24" y="32" class="ttl" font-size="18">VA3YMX SDR / ADS-B Receiver — System Diagram</text>
  <text x="24" y="50" class="sl">All antennas enter the project box on N coax, then an N&#8594;SMA pigtail. Filtered preamps powered via USB-C (5 V).</text>

  <!-- ================= ADS-B PATH (y~90) ================= -->
  <rect class="b" x="24"  y="68" width="150" height="52" rx="7" stroke="#7ee787"/>
  <text class="t" x="99"  y="90">Tuned 1090</text><text class="s" x="99" y="106">antenna · N</text>
  <rect class="b" x="200" y="68" width="116" height="52" rx="7" stroke="#6e7681"/>
  <text class="t" x="258" y="90">N&#8594;SMA</text><text class="s" x="258" y="106">pigtail</text>
  <rect class="b" x="492" y="68" width="158" height="52" rx="7" stroke="#3fb6ff"/>
  <text class="t" x="571" y="89">Uputronics 1090</text><text class="s" x="571" y="105">SAW + LNA ~16 dB</text>
  <rect class="b" x="820" y="68" width="150" height="52" rx="7" stroke="#d29922"/>
  <text class="t" x="895" y="90">RTL-SDR v4</text><text class="s" x="895" y="106">serial "1090"</text>

  <line x1="174" y1="94" x2="200" y2="94" marker-end="url(#ar)"/>
  <line x1="316" y1="94" x2="492" y2="94" marker-end="url(#ar)"/>
  <line x1="650" y1="94" x2="820" y2="94" marker-end="url(#ar)"/>
  <text class="lab" x="735" y="88">bias-tee 5 V (dongle &#8594; LNA)</text>
  <line x1="970" y1="94" x2="998" y2="94" marker-end="url(#ar)"/>

  <!-- ============ DISCONE PATH (y~236) — now DIRECT to the RSPduo (docs/12) ============ -->
  <rect class="b" x="24"  y="212" width="150" height="52" rx="7" stroke="#7ee787"/>
  <text class="t" x="99"  y="234">Diamond D3000N</text><text class="s" x="99" y="250">discone · N</text>
  <rect class="b" x="200" y="212" width="116" height="52" rx="7" stroke="#6e7681"/>
  <text class="t" x="258" y="234">N&#8594;SMA</text><text class="s" x="258" y="250">pigtail</text>
  <rect class="b" x="340" y="212" width="128" height="52" rx="7" stroke="#3fb6ff"/>
  <text class="t" x="404" y="234">FM band-stop</text><text class="s" x="404" y="250">filter</text>
  <rect class="b" x="492" y="212" width="158" height="52" rx="7" stroke="#3fb6ff"/>
  <text class="t" x="571" y="233">Uputronics WB</text><text class="s" x="571" y="249">100 MHz-4 GHz LNA</text>
  <rect class="b" x="700" y="206" width="166" height="64" rx="7" stroke="#d29922" stroke-width="2.4"/>
  <text class="t" x="783" y="228">SDRplay RSPduo</text><text class="s" x="783" y="244">Tuner 1 50&#937; · 14-bit</text><text class="s" x="783" y="259">discone receiver — now</text>

  <line x1="174" y1="238" x2="200" y2="238" marker-end="url(#ar)"/>
  <line x1="316" y1="238" x2="340" y2="238" marker-end="url(#ar)"/>
  <line x1="468" y1="238" x2="492" y2="238" marker-end="url(#ar)"/>
  <line x1="650" y1="238" x2="700" y2="238" marker-end="url(#ar)"/>
  <line x1="866" y1="238" x2="998" y2="205" marker-end="url(#ar)"/>

  <!-- discone receiver evolution / future (dashed note) — placed clear of the PoE line -->
  <rect x="24" y="278" width="462" height="54" rx="7" fill="#161b22" stroke="#8b949e" stroke-dasharray="6 4"/>
  <text class="sl" x="38" y="296" fill="#d7dde4">Discone receiver evolution &#8212; see docs/12</text>
  <text class="sl" x="38" y="312" fill="#9aa6b2">RTL-SDR &#8594; RSPduo (now) &#8594; Airspy R2 (ordered).</text>
  <text class="sl" x="38" y="327" fill="#9aa6b2">Stage 4: + ZFSC splitter &#8594; Airspy &amp; RTL = two receivers.</text>

  <!-- ================= RASPBERRY PI ================= -->
  <rect class="b" x="1000" y="60" width="216" height="248" rx="9" stroke="#f778ba" stroke-width="2"/>
  <text class="ttl" x="1014" y="84">Raspberry Pi 5 · 8 GB</text>
  <text class="sl"  x="1014" y="100">192.168.1.230  (Docker)</text>
  <line x1="1014" y1="110" x2="1202" y2="110" stroke="#2a313c"/>
  <text class="li" x="1014" y="132">• ultrafeeder &#8594; tar1090</text>
  <text class="li" x="1014" y="154">• OpenWebRX+ (web SDR)</text>
  <text class="li" x="1014" y="176">• OP25 / ACARS / decoders</text>
  <text class="li" x="1014" y="198">• Homepage + control panel</text>
  <text class="li" x="1014" y="220">• Grafana · Prometheus</text>
  <text class="li" x="1014" y="242">• APRS-IS exporter</text>
  <text class="li" x="1014" y="264">• 6 aggregators + community</text>

  <!-- ================= POWER + NETWORK (PoE) ================= -->
  <rect class="b" x="24"  y="372" width="170" height="50" rx="7" stroke="#9aa6b2"/>
  <text class="t" x="109" y="393">900 MHz link</text><text class="s" x="109" y="409">~45 Mbps to LAN</text>
  <rect class="b" x="222" y="372" width="178" height="50" rx="7" stroke="#f85149"/>
  <text class="t" x="311" y="393">PoE+ injector</text><text class="s" x="311" y="409">802.3at · 60 W · 2.5G</text>
  <rect class="b" x="428" y="372" width="150" height="50" rx="7" stroke="#f85149"/>
  <text class="t" x="503" y="393">PoE HAT (F)</text><text class="s" x="503" y="409">+ fan/heatsink</text>

  <line x1="194" y1="397" x2="222" y2="397" marker-end="url(#ar)"/>
  <line x1="400" y1="397" x2="428" y2="397" marker-end="url(#ar)"/>
  <text class="lab" x="311" y="438">power + data over one Cat6</text>
  <polyline points="503,372 503,345 1060,345 1060,308" fill="none" stroke="#f85149" stroke-width="2.4" marker-end="url(#arP)"/>
  <text class="labl" x="612" y="338" fill="#f85149">PoE: 5 V power + Ethernet &#8594; Pi</text>

  <!-- WAN / cloud -->
  <rect class="b" x="24"  y="470" width="170" height="46" rx="7" stroke="#9aa6b2"/>
  <text class="t" x="109" y="498">Internet / WAN</text>
  <line x1="109" y1="422" x2="109" y2="470" marker-end="url(#ar)"/>
  <rect class="b" x="222" y="462" width="600" height="62" rx="7" stroke="#9aa6b2"/>
  <text class="li" x="236" y="484">ADS-B aggregators: FlightAware · FR24 · RadarBox ·</text>
  <text class="li" x="236" y="502">PlaneFinder · OpenSky · ADSBExchange · community</text>
  <text class="li" x="236" y="518" fill="#a371f7">APRS-IS network</text>
  <line x1="194" y1="493" x2="222" y2="493" marker-end="url(#ar)"/>

  <!-- ================= APRS SIBLING PROJECT ================= -->
  <text class="sl" x="24" y="588">SIBLING PROJECT — APRS iGate (independent on the air, shares the LAN + dashboard)</text>
  <rect class="b" x="24"  y="600" width="150" height="50" rx="7" stroke="#7ee787"/>
  <text class="t" x="99"  y="621">Diamond CP22E</text><text class="s" x="99" y="637">2 m vertical</text>
  <rect class="b" x="200" y="600" width="160" height="50" rx="7" stroke="#a371f7"/>
  <text class="t" x="280" y="621">Yaesu FT-2800M</text><text class="s" x="280" y="637">144.390 MHz</text>
  <rect class="b" x="386" y="600" width="186" height="50" rx="7" stroke="#a371f7"/>
  <text class="t" x="479" y="621">WX3in1 Plus 2.0</text><text class="s" x="479" y="637">VA3YMX-1 · .235</text>

  <line x1="174" y1="625" x2="200" y2="625" marker-end="url(#ar)"/>
  <line x1="360" y1="625" x2="386" y2="625" marker-end="url(#ar)"/>
  <polyline points="572,612 700,612 700,524" fill="none" stroke="#a371f7" stroke-width="2" marker-end="url(#arA)"/>
  <text class="lab" x="636" y="606" fill="#a371f7">gates to APRS-IS</text>
  <polyline points="822,500 1180,500 1180,308" fill="none" stroke="#a371f7" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arA)"/>
  <text class="labl" x="826" y="494" fill="#a371f7">APRS stats: Pi exporter reads APRS-IS</text>

  <!-- ================= LEGEND ================= -->
  <rect x="1000" y="600" width="216" height="96" rx="7" fill="#161b22" stroke="#2a313c"/>
  <text class="sl" x="1014" y="618" fill="#d7dde4">Legend</text>
  <rect x="1014" y="626" width="11" height="11" fill="#7ee787"/><text class="sl" x="1031" y="635">antenna</text>
  <rect x="1108" y="626" width="11" height="11" fill="#3fb6ff"/><text class="sl" x="1125" y="635">RF filter/LNA</text>
  <rect x="1014" y="644" width="11" height="11" fill="#d29922"/><text class="sl" x="1031" y="653">receiver</text>
  <rect x="1108" y="644" width="11" height="11" fill="#f778ba"/><text class="sl" x="1125" y="653">compute</text>
  <rect x="1014" y="662" width="11" height="11" fill="#f85149"/><text class="sl" x="1031" y="671">power</text>
  <rect x="1108" y="662" width="11" height="11" fill="#a371f7"/><text class="sl" x="1125" y="671">APRS</text>
  <rect x="1014" y="680" width="11" height="11" fill="#9aa6b2"/><text class="sl" x="1031" y="689">network</text>
</svg>
